<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judul Berita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .content {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
            margin-bottom: 100px;
        }

        .content h1 {
            color: black;
        }

        .content img {
            max-width: 960px;
            margin: 0 auto;
            display: block;
        }

        .body-content {
            list-style-type: none;
            padding: 0;
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        .navbar {
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #d32f2f;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: #d32f2f;
        }
    </style>

    <script>
        const url = 'http://localhost:6969/article';

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                document.getElementById('title-text').innerText = data.title;
                document.getElementById('hero-image').src = data.hero;
                let bodyContent = '';
                data.body.forEach(block => {
                    if (block.type === 'paragraph') {
                        bodyContent += `<li>${block.content}</li>`;
                    }
                    else if (block.type === 'image') {
                        bodyContent += `<li><img src="${block.content}" alt="Image" style="max-width: 100%;"></li>`;
                    }
                });
                document.getElementById('body-content').innerHTML = bodyContent;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('body-content').innerText = 'Failed to load data.';
            });
    </script>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#" class="logo">NewsPortal</a>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Politics</a></li>
                <li><a href="#">Tech</a></li>
                <li><a href="#">Sports</a></li>
                <li><a href="#">Lifestyle</a></li>
            </ul>
        </div>
    </nav>
    <div class="content" id="body">
        <h1 id="title-text">Loading Title</h1>
        <img id="hero-image" src="" alt="Loading Hero Image">
        <ul class="body-content" id="body-content">
            <!-- Content will be injected here -->
        </ul>
    </div>
</body>

</html>
