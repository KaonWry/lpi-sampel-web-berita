<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judul Berita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .hero {
            /* background-image: url('hero.jpeg'); */
            background-size: cover;
            background-position: center;
            height: 500px;
            position: relative;
            padding: 0px;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .hero h1 {
            color: white;
            text-align: start;
            position: absolute;
            bottom: -20px;
            left: 0px;
            padding: 20px;
        }

        .content {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
            margin-bottom: 100px;
        }

        .content img {
            display: block;
            margin-top: 100px;
        }

        .content p {
            line-height: 1.6;
            margin-top: 100px;
        }
    </style>

    <script>
        const url = 'http://localhost:6969/article';

        fetch(url)
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json(); // Convert response to JSON
        })
        .then(data => {
            // Display a specific field from the returned object
            document.getElementById('title').innerHTML = `<h1>${data.title}</h1>`;
            document.getElementById('title').style.backgroundImage = `url('${data.hero}')`;
            let bodyContent = '';
            data.body.forEach(block => {
                if (block.type === 'paragraph') {
                    bodyContent += `<p>${block.content}</p>`;
                }
                else if (block.type === 'image') {
                    bodyContent += `<img src="${block.content}" alt="Image" style="max-width: 100%;">`;
                }
            });
            document.getElementById('body').innerHTML = bodyContent;
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('body').innerText = 'Failed to load data.';
        });
    </script>
</head>

<body>
    <div class="hero" id="title">
        <h1>Loading Title</h1>
    </div>
    <div class="content" id="body">
        <p>Loading content...</p>
    </div>
</body>

</html>
