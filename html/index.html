<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judul Berita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .content {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
            margin-bottom: 100px;
        }

        .content h1 {
            color: black;
            /* text-align: start; */
            /* position: absolute; */
            /* bottom: -20px; */
            /* left: 0px; */
            /* padding: 20px; */
        }

        .content img {
            max-width: 960px;
            margin: 0 auto;
            display: block;
        }

        .body-content {
            list-style-type: none;
            padding: 0;
            margin-top: 80px;
            /* gap: 20px; */
            /* line-height: 1.6; */
            display: flex;
            flex-direction: column;
            gap: 80px;
        }
    </style>

    <script>
        const url = 'http://localhost:6969/article';

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                document.getElementById('title-text').innerText = data.title;
                document.getElementById('hero-image').src = data.hero;
                let bodyContent = '';
                data.body.forEach(block => {
                    if (block.type === 'paragraph') {
                        bodyContent += `<li>${block.content}</li>`;
                    }
                    else if (block.type === 'image') {
                        bodyContent += `<li><img src="${block.content}" alt="Image" style="max-width: 100%;"></li>`;
                    }
                });
                document.getElementById('body-content').innerHTML = bodyContent;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('body-content').innerText = 'Failed to load data.';
            });
    </script>
</head>

<body>
    <div class="header" id="title">
        
    </div>
    </div>
    <div class="content" id="body">
        <h1 id="title-text">Loading Title</h1>
        <img id="hero-image" src="" alt="Loading Hero Image">
        <ul class="body-content" id="body-content">
            <!-- Content will be injected here -->
        </ul>
    </div>
</body>

</html>
